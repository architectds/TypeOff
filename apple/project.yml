name: TypeOff
options:
  bundleIdPrefix: com.typeoff
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # Set your team ID here

# No external packages — raw CoreML, no WhisperKit

targets:
  Typeoff:
    type: application
    platform: iOS
    sources:
      - path: Typeoff/Sources/App
      - path: Typeoff/Sources/Engine
      - path: Typeoff/Sources/Store
    resources:
      - path: Typeoff/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "TypeOff needs microphone access to transcribe your speech. Audio is processed entirely on your device."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: TypeOff
        PRODUCT_BUNDLE_IDENTIFIER: com.typeoff.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: TypeoffKeyboard
        embed: true
    entitlements:
      path: Typeoff/Typeoff.entitlements
    preBuildScripts: []
    scheme:
      testTargets:
        - TypeoffTests

  TypeoffKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Typeoff/Sources/Keyboard
      - path: Typeoff/Sources/Engine
      - path: Typeoff/Sources/Store/TrialManager.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Typeoff/Sources/Keyboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.typeoff.app.keyboard
    entitlements:
      path: Typeoff/TypeoffKeyboard.entitlements

  TypeoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Typeoff/Tests/Engine
    info:
      path: Typeoff/Tests/Info.plist
    dependencies:
      - target: Typeoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.typeoff.app.tests
        GENERATE_INFOPLIST_FILE: NO
